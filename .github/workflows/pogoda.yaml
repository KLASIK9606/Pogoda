name: Uruchomienie Procesu ETL

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4
        
      - name: Instalacja Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalacja narzedzi
        run: pip install pandas requests python-dotenv
        
      - name: Uruchomienie ETL
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python main.py